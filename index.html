<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FF6F00">
  <title>Fairy Tails — Training Display</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/display.css">
</head>
<body>
  <header class="display-header">
    <div class="header-left">
      <h1 class="header-title">Fairy Tails K9 Centre</h1>
      <p class="header-subtitle">Training Schedule</p>
    </div>
    <div class="header-right">
      <div class="header-date" id="current-date"></div>
      <div class="header-time" id="current-time"></div>
    </div>
  </header>

  <main id="schedule-content"></main>

  <footer class="display-footer">
    <span id="last-updated"></span>
    <span id="conflict-count"></span>
  </footer>

  <script src="js/display.js"></script>
</body>
</html>
